name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    name: Vitest API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Only run E2E after Vercel deploys (on push to main)
    # For PRs, run typecheck and unit tests only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Wait for Vercel deployment
        run: |
          echo "Waiting 90s for Vercel deployment to complete..."
          sleep 90
      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          BASE_URL: https://llc-xi.vercel.app
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
